name: Lint & Code Quality

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'SourceCode/src/**'
      - '**.py'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'SourceCode/src/**'
      - '**.py'

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Check import sorting (isort)
      run: |
        isort SourceCode/src --check-only --profile black 2>&1 || echo "⚠️  Import ordering issues found (use: isort SourceCode/src --profile black)"
    
    - name: Check code formatting (black)
      run: |
        black SourceCode/src --check 2>&1 || echo "⚠️  Formatting issues found (use: black SourceCode/src)"
    
    - name: Lint Python code (flake8)
      run: |
        # E501: line too long (handled by black)
        # W503: line break before binary operator (style preference)
        flake8 SourceCode/src --max-line-length=100 --ignore=E501,W503 --count --statistics --show-source
    
    - name: Check docstring coverage
      run: |
        python -m pip install pydocstyle || true
        pydocstyle SourceCode/src --ignore=D100,D104,D107,D205,D400 2>&1 || echo "⚠️  Docstring issues noted (not blocking)"
    
    - name: Markdown linting
      uses: nosborn/github-action-markdown-cli@v3.3.0
      with:
        files: .
        config_file: .markdownlint.json
      continue-on-error: true
