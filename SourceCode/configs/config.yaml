# ============================================================
# Plant Disease Detection - Centralized Configuration
# ============================================================
# All magic numbers and hardcoded values should be moved here.
# This file is the single source of truth for model configuration.
# ============================================================

# ============================================================
# Model Architecture
# ============================================================
model:
  architecture: "efficientnet_b2"  # Options: efficientnet_b0, efficientnet_b2, efficientnet_v2_s
  num_classes: 39                   # Number of disease classes (including Unknown)
  pretrained: true                  # Use ImageNet pretrained weights

# ============================================================
# Image Processing
# ============================================================
image:
  size: 260                         # Input image size (260 for EfficientNet-B2)
  mean: [0.485, 0.456, 0.406]      # ImageNet normalization mean
  std: [0.229, 0.224, 0.225]       # ImageNet normalization std

# ============================================================
# Training Hyperparameters
# ============================================================
training:
  batch_size: 32
  learning_rate: 1e-4
  weight_decay: 1e-4
  epochs: 20
  label_smoothing: 0.1
  gradient_clip: 1.0
  scheduler:
    type: "cosine"                  # Options: cosine, step, exponential
    T_0: 5                          # Initial restart period for cosine
    T_mult: 2                       # Multiplicative factor for cosine

# ============================================================
# Data Configuration
# ============================================================
data:
  raw_data_dir: data/raw
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 4
  seed: 42
  mask_prob: 0.7                    # Probability of applying segmentation mask during training

# ============================================================
# Data Augmentation (Real-World Robustness)
# ============================================================
augmentation:
  # Weather simulations
  shadow_prob: 0.3
  fog_prob: 0.2
  rain_prob: 0.2
  
  # Camera artifacts
  motion_blur_prob: 0.3
  gauss_noise_prob: 0.4
  compression_prob: 0.3
  blur_prob: 0.2
  
  # Color transforms
  brightness_prob: 0.8
  grayscale_prob: 0.05
  
  # Geometric transforms
  random_erasing_prob: 0.25

# ============================================================
# Quality Validation Thresholds
# ============================================================
quality_validation:
  # Blur detection (Laplacian variance)
  blur_threshold: 100.0
  
  # Brightness validation (0-255 scale)
  min_brightness: 30.0
  max_brightness: 220.0
  
  # Resolution validation
  min_width: 224
  min_height: 224
  max_width: 4000
  max_height: 4000

# ============================================================
# Inference Configuration
# ============================================================
inference:
  confidence_threshold: 0.5         # Minimum confidence for valid prediction
  unknown_threshold: 0.3            # Threshold for unknown class detection
  
  # TFLite delegation
  use_gpu_delegate: true
  use_xnnpack_delegate: true

# ============================================================
# Export Configuration
# ============================================================
export:
  onnx_opset: 15
  tflite_quantization: "float32"    # Options: float32, int8, float16
  
# ============================================================
# Metadata
# ============================================================
metadata:
  version: "1.0.0"
  export_date: null                 # Will be filled automatically
  description: "Plant Disease Detection Model - EfficientNet-B2"
  author: "Plant Disease Detection Team"